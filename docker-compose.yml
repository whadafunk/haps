services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: haps
      POSTGRES_DB: haps
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haps -d haps"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    command: node packages/api/dist/db/migrate.js
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - internal

  api:
    container_name: haps-api
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      NODE_ENV: production
      STORAGE_TYPE: local
      STORAGE_PATH: /uploads
    volumes:
      - uploads:/uploads
    networks:
      - internal
      - egress

  web:
    container_name: haps-web
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://haps-api:3000
    networks:
      - internal

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      internal:
      dmz:
        ipv4_address: 192.168.40.67

networks:
  internal:
    driver: bridge
    internal: true
  egress:
    driver: bridge
  dmz:
    external: true
    name: macnet-40

volumes:
  db_data:
  uploads:
